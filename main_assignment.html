        <script id="vertex-shader" type="x-shader/x-vertex">
            #version 300 es                               // GLSL ES 3.00
            in vec3 coordinates;                          // Vertex position
            in vec2 textureCoordinates;                   // Texture coordinates
            in vec3 normal;                               // Vertex normal
            in vec3 tangent;                              // Vertex tangent
            in vec3 bitangent;                            // Vertex bitangent
		    out vec2 vtextureCoordinates;                 // Texture coordinates out
            out vec3 vCubeMapCoordinates;                 // Cubemap coordinates out
            out vec3 vWorldPosition;                      // World position out
            out vec3 vWorldNormal;                        // World normal out
            out vec3 vWorldTangent;                       // World tangent out
            out vec3 vWorldBitangent;                     // World bitangent out
            uniform mat4 uScale;                          // Scale matrix uniform
            uniform mat4 uTranslate;                      // Translate matrix uniform
            uniform mat4 uXRotate;                        // X rotation matrix uniform
            uniform mat4 uYRotate;                        // Y rotation matrix uniform
            uniform mat4 uZRotate;                        // Z rotation matrix uniform
            uniform mat4 uP_Matrix;                       // Projection matrix uniform
            uniform mat4 uView_matrix;                    // View matrix uniform
            void main(){                                  
                vtextureCoordinates = textureCoordinates; // Pass texture coordinates
                vCubeMapCoordinates = coordinates;        // Pass cubemap coordinates
                mat4 uRotate = uZRotate * uYRotate * uXRotate;      // Combined rotation matrix
                mat4 modelMatrix = uTranslate * uRotate * uScale;   // Model matrix
                vec4 worldPosition = modelMatrix * vec4(coordinates, 1.0); // World position
                vWorldPosition = worldPosition.xyz;      // Store world position
                vWorldNormal = mat3(uRotate) * normal;   // Store world normal
                vWorldTangent = mat3(uRotate) * tangent; // Store world tangent
                vWorldBitangent = mat3(uRotate) * bitangent; // Store world bitangent
                mat4 VPMatrix = uP_Matrix * uView_matrix;            // View projection matrix
                mat4 MVPMatrix = VPMatrix * modelMatrix;             // Model view projection matrix
                gl_Position = MVPMatrix * vec4(coordinates, 1.0);    // Final Clip-space position
            }                                             
        
            </script>
            <script id="fragment-shader" type="x-shader/x-fragment">
                #version 300 es                                      // GLSL ES 3.00

                const int MAX_LIGHTS = 4;

                out vec4 FragColor;                                  // Fragment color out
                
                vec3 getMappedNormal(){                              // Convert tangent-space normal map data into a world-space normal
                    vec3 baseNormal = normalize(vWorldNormal);       // Normalize the interpolated mesh normal
                    vec3 tangent = vWorldTangent - baseNormal * dot(baseNormal, vWorldTangent); // Re-orthogonalize the tangent against the normal

                    if(length(tangent) < 0.0001 || length(bitangent) < 0.0001)
                    {
                        return baseNormal;                           // Fall back to the mesh normal if the UV derivatives are degenerate
                    }
                    tangent = normalize(tangent);                    // Normalize the tangent vector
                    bitangent = normalize(bitangent);                // Normalize the bitangent vector
                    vec3 sampledNormal = texture(uNormalMap, vtextureCoordinates).rgb * 2.0 - 1.0; // Convert the normal map from [0,1] into [-1,1]
                    sampledNormal = normalize(vec3(sampledNormal.xy * uBumpStrength, sampledNormal.z)); // Scale the tangent-space x/y perturbation
                    mat3 TBN = mat3(tangent, bitangent, baseNormal); // Build the tangent-to-world transform
                    return normalize(TBN * sampledNormal);           // Transform the tangent-space normal into world space
                }

                        vec4 ambientAccum = vec4(0.0);

                                lightDirection = normalize(lightVector);

                            /**********************************************/

                            vec4 ambientProduct = vec4(0.0); //A
			                vec4 diffuseProduct = vec4(0.0); //D_base
			                vec4 specularProduct = vec4(0.0); //S_base
                            /**********************************************/


                            /**********************************************/
                            // STEP 3:
                            // Calculate Lambert diffuse and final diffuse color
                            float Kd = 0.0;
                            vec4 diffuse = vec4(0.0);
                            /**********************************************/

                            // STEP 4:
                            // Blinn-Phong specular:
                            vec3 viewHalfVector = vec3(0.0, 0.0, 1.0);
                            float Ks = 0.0;
			                vec4 specular = vec4(0.0);
                            /**********************************************/

                            // STEP 6:
                            // Accumulate the ambient, diffuse, and specular contributions.
                            // Since they are all vec4 you can do it like: ambientAccum += ambientProduct;
                            /**********************************************/
                        }

                        vec3 ambientDiffuseColor = vec3(1.0);
                        vec3 specularColor = vec3(0.0);

                        /**********************************************/
                        // STEP 7:
                        // Clamp the final lighting colors.
                        /**********************************************/

                        if(uUseReflectionMap)                        
                        {                                            
                            vec3 incidentDirection = -viewDirection; // Incident direction
                            vec3 reflectionDirection = reflect(incidentDirection, surfaceNormal); // Reflection direction
                            vec4 reflectionColor = texture(uCubeMap, reflectionDirection); // Sample the reflected cubemap color
                            
                            /**********************************************/
                            // STEP 8a:
                            // Shade the reflection map using ambientDiffuseColor and specularColor.
                            // FragColor = vec4(reflectionColor.rgb * (0.65 + 0.35 * ambientDiffuseColor) + specularColor, reflectionColor.a);
                            FragColor = reflectionColor;
                            /**********************************************/
                            
                        }                                            
                        else if(uUseBlendMap)                        
                        {                                            
                            vec3 incidentDirection = -viewDirection; // Incident direction
                            vec3 reflectionDirection = reflect(incidentDirection, surfaceNormal); // Reflection direction
                            vec4 baseTextureColor = texture(uTexture, vtextureCoordinates); // Base texture color
                            /**********************************************/
                            // STEP 8b:
                            // Build the shaded base color using ambientDiffuseColor and specularColor.
                            vec4 bumpedBaseColor = baseTextureColor;
                            vec4 reflectionColor = texture(uCubeMap, reflectionDirection); // Calculate Reflection color
                            FragColor = mix(bumpedBaseColor, reflectionColor, uBlendFactor); // Blend the bumped base color with the reflection
                            /**********************************************/
                        }                                            
                        else                                          
                        {

                            /**********************************************/

        <script>
            // Get the canvas element from the HTML document
            var canvas = document.getElementById("example");
            // Create a WebGL2 rendering context from the canvas
            var gl= canvas.getContext('webgl2');
            // Instantiate the WebGL helper class

            // Normal map generator: https://cpetry.github.io/NormalMap-Online/

            //Objects
            var ReflectiveCube = new ReflectiveShape(cubeVertices, cubeIndices, cubeTextureCoordinates, cubeNormals); //create a reflective cube
            var BlendedCube = new ReflectiveShape(cubeVertices, cubeIndices, cubeTextureCoordinates, cubeNormals, OUTexture, NormalMapTexture); //create a blended cube with normal mapping
            var TexturedCube = new ReflectiveShape(cubeVertices, cubeIndices, cubeTextureCoordinates, cubeNormals, OUTexture, FlatNormalMapTexture); //create a textured cube with a flat fallback normal
            var TexturedandBumpedCube = new ReflectiveShape(cubeVertices, cubeIndices, cubeTextureCoordinates, cubeNormals, OUTexture, NormalMapTexture); //create a textured cube with normal mapping
            
            var SceneSkybox = new Skybox(cubeVertices, cubeIndices, cubeTextureCoordinates, SceneCubeMapTexture); //Use the cubemap to create a skybox

            ReflectiveCube.cubeMapTexture = SceneCubeMapTexture;
            BlendedCube.cubeMapTexture = SceneCubeMapTexture;
            TexturedCube.cubeMapTexture = SceneCubeMapTexture;
            TexturedandBumpedCube.cubeMapTexture = SceneCubeMapTexture;

            ReflectiveCube.size = [1.55, 1.55, 1.55];

            TexturedandBumpedCube.rotation[0] = 0.35;
            TexturedandBumpedCube.rotation[1] = 0.8;
            
            
            setPerspective(myWebGL);

            function animate(){
               gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
              
	               ReflectiveCube.rotation[1] += 0.003;
	               BlendedCube.rotation[1] += 0.003;
	               TexturedCube.rotation[1] += 0.003;
	               TexturedandBumpedCube.rotation[1] += 0.003;

	               MainCamera.render();
	               MainLight.lightPosition[0] = MainCamera.position[0];
	               MainLight.lightPosition[1] = MainCamera.position[1];
	               MainLight.lightPosition[2] = MainCamera.position[2];
	               for (var i = 0; i < Lights.length; i++) {
	                   Lights[i].render(i, Lights.length);
	               }
	           SceneSkybox.render(MainCamera);
	           ReflectiveCube.render();
               BlendedCube.render();
               TexturedCube.render();
               TexturedandBumpedCube.render();
               window.requestAnimationFrame(animate);

            }
            animate();
