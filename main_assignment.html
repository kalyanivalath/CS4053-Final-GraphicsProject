<!DOCTYPE html>
<html>
<head>
    <title>Treasure Collector</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            border: none;
        }

        #ui {
            position: absolute;
            top: 12px;
            left: 12px;
            color: white;
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0.35);
            padding: 10px 14px;
            border-radius: 8px;
            z-index: 10;
        }
    </style>
</head>

<script src="WebGL.js"></script>
<script src="Functions.js"></script>
<script src="Classes.js"></script>
<script src="Objects.js"></script>

<body>
    <div id="ui">
        <div><strong>Treasure Collector</strong></div>
        <div>WASD to move</div>
        <div>C to collect coins</div>
    </div>

    <canvas id="example" tabindex="0"></canvas>

    <script id="vertex-shader" type="x-shader/x-vertex">
        #version 300 es

        in vec3 coordinates;
        in vec2 textureCoordinates;
        in vec3 normal;
        in vec3 tangent;
        in vec3 bitangent;

        out vec2 vtextureCoordinates;
        out vec3 vWorldPosition;
        out vec3 vWorldNormal;
        out vec3 vWorldTangent;
        out vec3 vWorldBitangent;

        uniform mat4 uScale;
        uniform mat4 uTranslate;
        uniform mat4 uXRotate;
        uniform mat4 uYRotate;
        uniform mat4 uZRotate;
        uniform mat4 uP_Matrix;
        uniform mat4 uView_matrix;

        void main() {
            vtextureCoordinates = textureCoordinates;

            mat4 uRotate = uZRotate * uYRotate * uXRotate;
            mat4 modelMatrix = uTranslate * uRotate * uScale;

            vec4 worldPosition = modelMatrix * vec4(coordinates, 1.0);
            vWorldPosition = worldPosition.xyz;

            vWorldNormal = mat3(uRotate) * normal;
            vWorldTangent = mat3(uRotate) * tangent;
            vWorldBitangent = mat3(uRotate) * bitangent;

            mat4 VPMatrix = uP_Matrix * uView_matrix;
            mat4 MVPMatrix = VPMatrix * modelMatrix;

            gl_Position = MVPMatrix * vec4(coordinates, 1.0);
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        #version 300 es
        precision mediump float;

        in vec2 vtextureCoordinates;
        in vec3 vWorldPosition;
        in vec3 vWorldNormal;
        in vec3 vWorldTangent;
        in vec3 vWorldBitangent;

        uniform sampler2D uTexture;
        uniform sampler2D uNormalMap;
        uniform float uBumpStrength;
        uniform vec3 uCameraPosition;

        const int MAX_LIGHTS = 4;

        uniform int uLightCount;
        uniform vec4 LightPos[MAX_LIGHTS];
        uniform vec4 ambientLight[MAX_LIGHTS];
        uniform vec4 diffuseLight[MAX_LIGHTS];
        uniform vec4 specularLight[MAX_LIGHTS];

        uniform vec4 ambientMat;
        uniform vec4 diffuseMat;
        uniform vec4 specularMat;
        uniform float shininess;

        out vec4 FragColor;

        vec3 getMappedNormal() {
            vec3 baseNormal = normalize(vWorldNormal);

            vec3 tangent = vWorldTangent - baseNormal * dot(baseNormal, vWorldTangent);
            vec3 bitangent = vWorldBitangent - baseNormal * dot(baseNormal, vWorldBitangent);

            if(length(tangent) < 0.0001 || length(bitangent) < 0.0001) {
                return baseNormal;
            }

            tangent = normalize(tangent);
            bitangent = normalize(bitangent);

            vec3 sampledNormal = texture(uNormalMap, vtextureCoordinates).rgb * 2.0 - 1.0;
            sampledNormal = normalize(vec3(sampledNormal.xy * uBumpStrength, sampledNormal.z));

            mat3 TBN = mat3(tangent, bitangent, baseNormal);
            return normalize(TBN * sampledNormal);
        }

        void main() {
            vec3 surfaceNormal = getMappedNormal();
            vec3 viewDirection = normalize(uCameraPosition - vWorldPosition);

            vec4 ambientAccum = vec4(0.0);
            vec4 diffuseAccum = vec4(0.0);
            vec4 specularAccum = vec4(0.0);

            for(int i = 0; i < MAX_LIGHTS; ++i) {
                if(i >= uLightCount) {
                    break;
                }

                vec3 lightDirection;
                float attenuation = 1.0;

                if(LightPos[i].w == 0.0) {
                    lightDirection = normalize(LightPos[i].xyz);
                } else {
                    vec3 lightVector = LightPos[i].xyz - vWorldPosition;
                    float lightDistance = length(lightVector);
                    lightDirection = normalize(lightVector);

                    attenuation = 1.0 / 
                        (1.0 + 0.09 * lightDistance + 0.032 * lightDistance * lightDistance);
                }

                vec4 ambientProduct = ambientLight[i] * ambientMat;
                vec4 diffuseProduct = diffuseLight[i] * diffuseMat;
                vec4 specularProduct = specularLight[i] * specularMat;

                float Kd = max(dot(surfaceNormal, lightDirection), 0.0);
                vec4 diffuse = Kd * diffuseProduct;

                vec3 viewHalfVector = normalize(lightDirection + viewDirection);
                float Ks = pow(max(dot(surfaceNormal, viewHalfVector), 0.0), shininess);
                vec4 specular = Ks * specularProduct;

                if(Kd <= 0.0) {
                    specular = vec4(0.0);
                }

                ambientAccum += ambientProduct;
                diffuseAccum += attenuation * diffuse;
                specularAccum += attenuation * specular;
            }

            vec3 ambientDiffuseColor = clamp((ambientAccum + diffuseAccum).rgb, 0.0, 1.0);
            vec3 specularColor = clamp(specularAccum.rgb, 0.0, 1.0);

            vec4 baseTextureColor = texture(uTexture, vtextureCoordinates);

            // REMOVE TRANSPARENT PIXELS (this is the fix)
            if(baseTextureColor.a < 0.1) discard;

            FragColor = vec4(
                baseTextureColor.rgb * ambientDiffuseColor + specularColor,
                baseTextureColor.a
            );
        }
    </script>

    <script>
        var canvas = document.getElementById("example");
        var gl = canvas.getContext("webgl2");
        var myWebGL = new WebGL();

        var collision = new CollisionDetection();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        gl.enable(gl.DEPTH_TEST);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        // Simple sky color instead of cube map
        gl.clearColor(0.5, 0.7, 1.0, 1.0);

        var MainCamera = new Camera();
        var MainLight = new Light();

        var Lights = [MainLight];

        MainCamera.position = [0.0, 10, 20.0];

        MainLight.lightPosition = [0.0, 5.0, 4.0, 1.0];
        MainLight.lightAmbient = [0.55, 0.55, 0.55, 1.0];
        MainLight.lightDiffuse = [1.0, 1.0, 1.0, 1.0];
        MainLight.lightSpecular = [0.7, 0.7, 0.7, 1.0];

        function createGrassTexture(gl) {
            const size = 128;
            const texCanvas = document.createElement("canvas");
            texCanvas.width = size;
            texCanvas.height = size;

            const ctx = texCanvas.getContext("2d");

            ctx.fillStyle = "#4f9f3f";
            ctx.fillRect(0, 0, size, size);

            for(let i = 0; i < 450; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const w = 2 + Math.random() * 4;
                const h = 2 + Math.random() * 4;

                ctx.fillStyle = Math.random() > 0.5 ? "#3f8a31" : "#6bbf4d";
                ctx.fillRect(x, y, w, h);
            }

            for(let i = 0; i < 180; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const len = 6 + Math.random() * 10;

                ctx.strokeStyle = Math.random() > 0.5 ? "#2f6f24" : "#7ed957";
                ctx.lineWidth = 1;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.random() * 3 - 1.5, y - len);
                ctx.stroke();
            }

            const texture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, texture);

            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

            gl.texImage2D(
                gl.TEXTURE_2D,
                0,
                gl.RGBA,
                gl.RGBA,
                gl.UNSIGNED_BYTE,
                texCanvas
            );

            gl.generateMipmap(gl.TEXTURE_2D);

            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

            return texture;
        }

        var GrassTexture = createGrassTexture(gl);

        var FlatNormalMapTexture = CreateImageTexture(
            "Textures/NoBump.png",
            gl.REPEAT,
            gl.LINEAR_MIPMAP_LINEAR,
            gl.LINEAR,
            new Uint8Array([128, 128, 255, 255])
        );

        var OrangeTexture = CreateImageTexture(
            "Textures/orange.png",
            gl.CLAMP_TO_EDGE,
            gl.LINEAR_MIPMAP_LINEAR,
            gl.LINEAR,
            new Uint8Array([255, 120, 40, 255])
        );

        // Coin
        var CoinTexture = CreateImageTexture(
            "Textures/coin-bg.png",
            gl.CLAMP_TO_EDGE,
            gl.LINEAR,
            gl.LINEAR
        );

        var CoinNormal = CreateImageTexture(
            "Textures/coin-bg_normal.png",
            gl.CLAMP_TO_EDGE,
            gl.LINEAR,
            gl.LINEAR
        );

        var coins = [];
        

        for (let i = 0; i < 5; i++) {
            let x = Math.random() * 20 - 10;
            let z = Math.random() * 20 - 10;

            
            coins.push({
                object: createCoin(x, z),
                active: true
            });
        }

        // Trees
        var BarkTexture = CreateImageTexture(
            "Textures/bark.png",
            gl.REPEAT,
            gl.LINEAR,
            gl.LINEAR
        );

        var BarkNormal = CreateImageTexture(
            "Textures/bark_normal.png",
            gl.REPEAT,
            gl.LINEAR,
            gl.LINEAR
        );

        var LeafTexture = CreateImageTexture(
            "Textures/leaf.png",
            gl.CLAMP_TO_EDGE,
            gl.LINEAR,
            gl.LINEAR
        );

        var LeafNormal = CreateImageTexture(
            "Textures/leaf_normal.png",
            gl.CLAMP_TO_EDGE,
            gl.LINEAR,
            gl.LINEAR
        );

        var trees = [];

        trees.push(createTree(3, -3));
        trees.push(createTree(-4, -6));
        trees.push(createTree(6, -8));
        trees.push(createTree(-2, -10));

        // Ground
        var Ground = new ReflectiveShape(
            cubeVertices,
            cubeIndices,
            cubeTextureCoordinates,
            cubeNormals,
            GrassTexture,
            FlatNormalMapTexture
        );

        Ground.size = [100.0, 0.05, 100.0];
        Ground.position = [0.0, -1.0, 0.0];
        Ground.rotation = [0.0, 0.0, 0.0];
        Ground.blendFactor = 0.0;
        Ground.bumpStrength = 0.0;

        // Orange block / player placeholder
        var PlayerCube = new ReflectiveShape(
            cubeVertices,
            cubeIndices,
            cubeTextureCoordinates,
            cubeNormals,
            OrangeTexture,
            FlatNormalMapTexture
        );

        PlayerCube.size = [3, 7, 3];
        PlayerCube.position = [0.0, -0.55, 0.0];
        PlayerCube.rotation = [0.0, 0.0, 0.0];
        PlayerCube.blendFactor = 0.0;
        PlayerCube.bumpStrength = 0.0;

        setPerspective(myWebGL);

        var keys = {};
        var playerSpeed = 0.08;

        window.addEventListener("keydown", function(event) {
            keys[event.key.toLowerCase()] = true;
        });

        window.addEventListener("keyup", function(event) {
            keys[event.key.toLowerCase()] = false;
        });

        function updatePlayerAndCamera() {
            // Save old position
            let oldX = PlayerCube.position[0];
            let oldZ = PlayerCube.position[2];


            if(keys["w"]) PlayerCube.position[2] -= playerSpeed;
            if(keys["s"]) PlayerCube.position[2] += playerSpeed;
            if(keys["a"]) PlayerCube.position[0] -= playerSpeed;
            if(keys["d"]) PlayerCube.position[0] += playerSpeed;

            // COLLISION CHECK
            for (let i = 0; i < trees.length; i++) {
                let treePos = trees[i].trunk.position;

                let hit = collision.SphereCollider(
                    PlayerCube.position,
                    treePos,
                    1.2   // adjust this if needed
                );

                if (hit) {
                    // revert movement
                    PlayerCube.position[0] = oldX;
                    PlayerCube.position[2] = oldZ;
                    break;
                }
            }


            // Camera follows behind and above the cube
            MainCamera.position[0] = PlayerCube.position[0];
            MainCamera.position[1] = PlayerCube.position[1] + 2.0;
            MainCamera.position[2] = PlayerCube.position[2] + 5.0;

            // Camera looks toward the cube
            if(MainCamera.lookAt) {
                MainCamera.lookAt([
                    PlayerCube.position[0],
                    PlayerCube.position[1],
                    PlayerCube.position[2]
                ]);
            }
        }

        

        function animate() {
            gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

            
            updatePlayerAndCamera();
            collectCoins();
            
            MainCamera.render();

            for(var i = 0; i < Lights.length; i++) {
                Lights[i].render(i, Lights.length);
            }

            for (let i = 0; i < coins.length; i++) {
                if (!coins[i].active) continue;

                coins[i].object.rotation[1] += 0.05; // spin
                coins[i].object.render();
            }

            for (let i = 0; i < trees.length; i++) {
                trees[i].trunk.render();
                trees[i].leaves.render();
            }

            PlayerCube.render();
            Ground.render();
            
            

            window.requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
